# Zeabur 部署配置（备选方案）
# 文档: https://zeabur.com/docs

# ============================================================
# 注意：Zeabur 免费额度有限，推荐使用 Vercel + Cloudflare 方案
#
# 如需使用 Zeabur:
# 1. 注册 https://zeabur.com（支持 GitHub 登录）
# 2. Create Project → 选择区域: Hong Kong（国内访问最佳）
# 3. Add Service → Git → 选择 yanwx54/starcraft-team-data-platform
# 4. 设置 Root Directory: backend
# 5. 环境变量:
#    DATABASE_URL = postgresql://user:pass@ep-xxx.neon.tech/starcraft?sslmode=require
#    ENVIRONMENT = production
#    CRON_SECRET = <自定义随机字符串>
# 6. Zeabur 自动检测 Dockerfile 并构建
# ============================================================
